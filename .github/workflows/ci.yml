name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build & checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Prettier
        run: npm run format:check

      - name: Astro check
        run: npm run check

      - name: Build
        run: npm run build

  spellcheck:
    name: Spell check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: codespell-project/actions-codespell@v2
        with:
          path: src/content
          skip: ./node_modules,./dist,./package-lock.json
